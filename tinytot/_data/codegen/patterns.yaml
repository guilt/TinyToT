  - pattern: '\blevel.order\b|\bbfs\s+tree\b|\bbreadth.first\s+(?:search\s+)?tree\b'
    key: bfs_level_order

  # -------------------------------------------------------------------------
  # Compositional problems
  # -------------------------------------------------------------------------
  - pattern: '\bmedian\b'
    key: median

  - pattern: '\bsecond\s+largest\b|\bsecond\s+maximum\b|\bsecond\s+biggest\b'
