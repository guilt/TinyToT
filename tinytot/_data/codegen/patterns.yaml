    note: "Count Digit2s"
  - pattern: '\bsubset\b.*\bsum\b'
    key: subset_sum
    note: "Subset Sum"
  - pattern: '\bequal\b.*\bpartition\b.*\bpossible\b'
    key: equal_partition_possible
    note: "Equal Partition Possible"
  - pattern: '\bdivide\b.*\bnumbers\b'
    key: divide_two_numbers
    note: "Divide Two Numbers"
  - pattern: '\beulerian\b.*\bpath\b'
    key: eulerian_path
    note: "Eulerian Path"
  - pattern: '\bhierholzers\b.*\balgorithm\b'
    key: hierholzers_algorithm
    note: "Hierholzers Algorithm"
  - pattern: '\bedit\b.*\bdistance\b'
    key: edit_distance
    note: "Edit Distance"
  - pattern: '\bminimum\b.*\bwindow\b.*\bsubstring\b'
    key: minimum_window_substring
    note: "Minimum Window Substring"
  - pattern: '\bpalindrome\b.*\blinked\b.*\blist\b'
    key: palindrome_as_linked_list
    note: "Palindrome As Linked List"
  - pattern: '\bsunset\b.*\bview\b'
    key: sunset_view
    note: "Sunset View"
  - pattern: '\bconstruct2\b.*\bbuildings\b.*\bspace\b'
    key: construct2_buildings_with_space
    note: "Construct2 Buildings With Space"
  - pattern: '\bsearch2\b.*\bmatrix\b'
    key: search2_d_matrix
    note: "Search2 D Matrix"
  - pattern: '\brod\b.*\bcutting\b'
    key: rod_cutting
    note: "Rod Cutting"
  - pattern: '\bwinning\b.*\blottery\b'
    key: winning_lottery
    note: "Winning Lottery"

  # Aliases for pattern-match gaps
  - pattern: '\bllrb\b|\bleft.leaning\s+red.black\b'
    key: llrb
    note: "Left-Leaning Red-Black Tree"
  - pattern: '\brandom.*5.*7\b|\bextend.*random\b'
    key: random1_5to1_7
    note: "Random 1-5 to 1-7"
  - pattern: '\bclimbing\s+stairs?\b|\bclimb\s+stairs?\b'
    key: climb_stairs
  - pattern: '\bcoin\s+change\s*ii\b|\bcoin\s+change\s+2\b|\bways?\s+to\s+make\s+change\b'
    key: coin_change
  - pattern: '\bmaximum\s+subarray\b|\blargest\s+contiguous\b|\bmax\s+sum\s+subarray\b'
    key: kadane
  - pattern: '\bhouse\s+robber\b|\brob\s+houses\b'
    key: house_robber
  - pattern: '\bfloyd\b|\btortoise\s+and\s+hare\b'
    key: cycle_detection
