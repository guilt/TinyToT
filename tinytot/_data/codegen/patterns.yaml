# Code generation pattern registry.
# Each entry maps a regex pattern to a template key.
# Patterns are tested in order -- more specific patterns must come first.
#
# Format:
#   - pattern: "regex string"   (Python re syntax, IGNORECASE always applied)
#     key: template_key         (must match a file in templates/<key>.md)
#     note: "optional human description"
#
# The isCodeRequest gate fires when ANY of these patterns matches,
# even without "write/implement" phrasing.

patterns:

  # -------------------------------------------------------------------------
  # High-priority specifics -- must come before generic patterns
  # -------------------------------------------------------------------------
  - pattern: '\bcycle\s+in\s+(?:a\s+)?linked\s+list\b|\bdetect\s+cycle\b|\bfloyd\b'
    key: cycle_detection
    note: "must be before linked_list generic"

  - pattern: '\blevel.order\b|\bbfs\s+tree\b|\bbreadth.first\s+(?:search\s+)?tree\b'
    key: bfs_level_order
    note: "must be before bst generic"


  # -------------------------------------------------------------------------
  # Data structures
  # -------------------------------------------------------------------------
  - pattern: '\bstack\b.{0,30}\b(?:push|pop|peek)\b'
    key: stack
    note: Stack with push/pop/peek

  - pattern: '\bqueue\b.{0,30}\b(?:enqueue|dequeue)\b'
    key: queue
    note: Queue with enqueue/dequeue

  - pattern: '\blinked\s*list\b'
    key: linked_list
    note: Singly linked list

  - pattern: '\bbinary\s*(?:search\s*)?tree\b'
    key: bst
    note: Binary search tree

  - pattern: '\bmax\s*heap\b|\bmin\s*heap\b|\bpriority\s*queue\b'
    key: heap
    note: Heap / priority queue

  # -------------------------------------------------------------------------
  # Sorting algorithms
  # -------------------------------------------------------------------------
  - pattern: '\bmerge\s*sort\b'
    key: merge_sort

  - pattern: '\bquick\s*sort\b'
    key: quick_sort

  - pattern: '\bbubble\s*sort\b'
    key: bubble_sort

  - pattern: '\b(?:sort|order).{0,20}\b(?:list|array|numbers)\b'
    key: sort_list
    note: Generic sort -- less specific than named algorithms

  # -------------------------------------------------------------------------
  # Search and numeric algorithms
  # -------------------------------------------------------------------------
  - pattern: '\bbinary\s*search\b'
    key: binary_search

  - pattern: '\bfibonacci\b'
    key: fibonacci

  - pattern: '\bfactorial\b'
    key: factorial

  - pattern: '\bpalindrome\b'
    key: palindrome

  - pattern: '\btwo\s*sum\b|\btwosum\b'
    key: two_sum

  - pattern: '\bfind.{0,20}\b(?:max|maximum)\b'
    key: find_max

  - pattern: '\bfind.{0,20}\b(?:min|minimum)\b'
    key: find_min

  - pattern: '\breverse.{0,20}\b(?:string|str|list|array)\b'
    key: reverse_string

  - pattern: '\bflatten.{0,20}\b(?:list|array|nested)\b'
    key: flatten

  - pattern: '\bcount.{0,30}\b(?:words?|occurrences?|frequency)\b'
    key: word_count

  # -------------------------------------------------------------------------
  # Python-specific patterns
  # -------------------------------------------------------------------------
  - pattern: '\bdecorator\b.{0,30}\b(?:log|cache|retry|time)\b'
    key: decorator_log
    note: Specific decorator types -- check before generic decorator

  - pattern: '\bdecorator\b'
    key: decorator_generic

  - pattern: '\blist\s*comprehension\b|\bfilter.{0,20}\beven\b'
    key: list_comprehension

  - pattern: '\bdataclass\b'
    key: dataclass

  - pattern: '\bcontext\s*manager\b|\bwith\s*statement\b'
    key: context_manager

  - pattern: '\bgenerator\b.{0,30}\b(?:yield|infinite|sequence)\b'
    key: generator

  # -------------------------------------------------------------------------
  # SQL
  # -------------------------------------------------------------------------
  - pattern: '\bselect\b.{0,40}\b(?:where|from|join)\b'
    key: sql_select

  - pattern: '\bjoin\b.{0,30}\b(?:tables?|inner|left|right|query|users?|orders?)\b'
    key: sql_join

  - pattern: '\binsert\b.{0,30}\binto\b'
    key: sql_insert

  - pattern: '\bcreate\s*table\b'
    key: sql_create

  # -------------------------------------------------------------------------
  # OOP patterns
  # -------------------------------------------------------------------------
  - pattern: '\bclass\b.{0,40}\b(?:person|user|product|car|animal|student)\b'
    key: class_generic
    note: Generic class for common domain objects

  - pattern: '\bsingleton\b'
    key: singleton

  - pattern: '\bobserver\s*pattern\b|\bevent\s*listener\b'
    key: observer

  # -------------------------------------------------------------------------
  # New canonical algorithms
  # -------------------------------------------------------------------------
  - pattern: '\bgcd\b|\bgreatest\s*common\s*divisor\b|\blcm\b|\bleast\s*common\s*multiple\b'
    key: gcd

  - pattern: '\bis\s+(?:a\s+)?prime\b|\bcheck\s+(?:if\s+)?prime\b|\bprimality\b'
    key: is_prime

  - pattern: '\bsieve\b|\ball\s+prime\b|\bprime\s+numbers?\s+up\s+to\b|\bprimes?\s+up\s+to\b'
