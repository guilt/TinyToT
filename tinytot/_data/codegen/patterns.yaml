  - pattern: '\bfizzbuzz\b|\bfizz\s*buzz\b'
    key: fizzbuzz

  - pattern: '\bkadane\b|\bmaximum\s+subarray\b|\bmax\s+subarray\b|\bcontiguous\s+subarray\b'
